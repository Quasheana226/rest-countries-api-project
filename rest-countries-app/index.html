<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="app.js" defer></script>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik+Distressed&family=Rubik:ital,wght@0,300..900;1,300..900&family=Truculenta:opsz,wght@12..72,100..900&display=swap"
      rel="stylesheet"
    />

    <title>REST Countries API</title>
  </head>
  <body>
    <header>
      <nav>
        <div class="container">
          <div class="logo">
            <h1 class="logo"><strong>Where in the world</strong></h1>
            <p class="logo-subtitle">
              Find out interesting facts about countries around the world.
            </p>
          </div>
          <div class="nav-right">
            <button id="dark-mode-btn" class="dark-mode-btn">Dark Mode</button>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <div class="container">
        <div class="search-filter">
          <input
            type="text"
            id="search-input"
            placeholder="Search for a country..."
          />
          <select id="region-filter">
            <option value="">Filter by Region</option>
            <option value="Africa">Africa</option>
            <option value="Americas">America</option>
            <option value="Asia">Asia</option>
            <option value="Europe">Europe</option>
            <option value="Oceania">Oceania</option>
          </select>
        </div>

        <div id="country-container" class="country-container">
          <!-- Country cards will be dynamically inserted here -->
        </div>

        <div id="country-details-container" class="country-details-container">
          <!-- Country details will be dynamically inserted here -->
        </div>
      </div>
    </main>
  </body>
</html>
